# Digital Ocean App Platform spec.
# Use via: doctl apps create --spec .do/app.yaml
#
# The repo field should point at your fork/origin; override ANTHROPIC_API_KEY
# and JWT_SECRET via the web UI as encrypted secrets.
name: fiscal-extractor
region: nyc

services:
  - name: api
    dockerfile_path: fiscal-extractor/Dockerfile
    source_dir: fiscal-extractor
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-s
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
    envs:
      - key: APP_ENV
        value: production
      - key: AUTH_ENABLED
        value: "true"
      - key: ENABLE_CELERY
        value: "true"
      - key: LLM_MODEL
        value: claude-sonnet-4-20250514
      - key: OCR_ENGINE
        value: tesseract
      - key: OCR_LANGUAGE
        value: por
      - key: ANTHROPIC_API_KEY
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${redis.DATABASE_URL}

workers:
  - name: celery-worker
    dockerfile_path: fiscal-extractor/Dockerfile
    source_dir: fiscal-extractor
    run_command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=2
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: APP_ENV
        value: production
      - key: ENABLE_CELERY
        value: "true"
      - key: ANTHROPIC_API_KEY
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${redis.DATABASE_URL}

databases:
  - name: redis
    engine: REDIS
    production: false
